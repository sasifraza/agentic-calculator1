name: Deploy Agentic Calculator

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run agent test
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 -c "from app.agent import run_agent; run_agent('What is 2 + 2?')"

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and Push to ACR
        run: |
          az acr build --registry agenticcalculator1 \
            --image agentic-calculator:latest .

      - name: Deploy to Container App
        run: |
          az containerapp update \
            --name agentic-calculator-app1 \
            --resource-group agentic-calculator-rg1 \
            --image agenticcalculator1.azurecr.io/agentic-calculator:latest